<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ざんえいのぱすわーど</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 18px;
      min-height: 100vh;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif;
      color: #5b456d;
      background:
        radial-gradient(circle at 12% 10%, #fff6a8 0 7%, transparent 8%),
        radial-gradient(circle at 88% 12%, #ffd6ef 0 8%, transparent 9%),
        radial-gradient(circle at 12% 86%, #cffff8 0 9%, transparent 10%),
        radial-gradient(circle at 88% 84%, #e8dcff 0 8%, transparent 9%),
        linear-gradient(135deg, #fff0fa, #f1fbff 48%, #fff8d8);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 3px solid #ffaad4;
      border-radius: 28px;
      box-shadow:
        0 10px 0 #f4c5df,
        0 18px 28px rgba(166, 95, 145, 0.18);
      padding: 22px;
      margin-bottom: 18px;
    }

    .title-card {
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .title-card::before,
    .title-card::after {
      content: "♡";
      position: absolute;
      font-size: 76px;
      color: rgba(255, 170, 212, 0.25);
      top: 5px;
    }

    .title-card::before {
      left: 16px;
      transform: rotate(-18deg);
    }

    .title-card::after {
      right: 16px;
      transform: rotate(18deg);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      color: #ff6fb3;
      text-shadow: 2px 2px 0 #fff3a6;
      letter-spacing: 0.06em;
    }

    .subtitle {
      margin-top: 10px;
      color: #7d6f92;
      font-weight: 900;
      line-height: 1.8;
    }

    .status {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge {
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 900;
      border: 2px solid #fff;
      box-shadow: 0 3px 0 rgba(123, 88, 138, 0.18);
    }

    .badge-turn {
      background: #c9f7ff;
      color: #39788a;
    }

    .badge-mode {
      background: #ffd2ea;
      color: #b44982;
    }

    .question {
      text-align: center;
      padding: 18px;
      background: linear-gradient(180deg, #fffaff, #fff0f9);
      border: 3px dashed #ffaad4;
      border-radius: 24px;
      margin-bottom: 18px;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .question-label {
      font-size: 17px;
      font-weight: 1000;
      color: #9d75c7;
      margin-bottom: 12px;
    }

    .number-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 78px;
    }

    .number {
      display: inline-block;
      font-size: 58px;
      line-height: 1;
      font-weight: 1000;
      color: #7c8cff;
      letter-spacing: 0.16em;
      margin-left: 0.16em;
      text-shadow:
        3px 3px 0 #ffffff,
        5px 5px 0 #ffe0f2;
    }

    .final-number {
      color: #ff9f1c;
      background: #fff8d8;
      border: 3px solid #ffcf65;
      border-radius: 22px;
      padding: 12px 18px;
      box-shadow: 0 6px 0 #ffe3a6;
      text-shadow:
        3px 3px 0 #fff,
        5px 5px 0 #ffe5a9;
    }

    .guide {
      display: inline-block;
      font-size: 19px;
      font-weight: 1000;
      color: #ff6fb3;
      background: #fff9d9;
      border: 2px solid #ffcf65;
      border-radius: 999px;
      padding: 7px 16px;
      margin-top: 16px;
      box-shadow: 0 4px 0 #ffe3a6;
    }

    .buttons-wrap {
      text-align: center;
    }

    .click-caption {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 14px;
      background: #e9dcff;
      color: #7b5bcc;
      border: 2px solid #cbb7ff;
      border-radius: 999px;
      font-weight: 1000;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 18px 8px;
      font-size: 24px;
      font-weight: 1000;
      color: #fff;
      cursor: pointer;
      transition: transform 0.05s, box-shadow 0.05s, filter 0.15s;
    }

    button:hover {
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(5px);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .button-0 {
      background: linear-gradient(180deg, #b9d7ff, #7daeff);
      box-shadow: 0 6px 0 #5d87d9;
    }

    .button-1 {
      background: linear-gradient(180deg, #ffc3e4, #ff7fc1);
      box-shadow: 0 6px 0 #d85c9d;
    }

    .button-2 {
      background: linear-gradient(180deg, #d9c9ff, #a894ff);
      box-shadow: 0 6px 0 #7e6ed9;
    }

    .button-3 {
      background: linear-gradient(180deg, #bffff3, #67dccd);
      box-shadow: 0 6px 0 #45b4a6;
    }

    .button-4 {
      background: linear-gradient(180deg, #ffeaa7, #ffc857);
      box-shadow: 0 6px 0 #d9a83a;
    }

    .control-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .control {
      font-size: 18px;
      padding: 15px 8px;
    }

    .back {
      background: linear-gradient(180deg, #c7d1e8, #9ba9c9);
      box-shadow: 0 6px 0 #7886a4;
    }

    .reset {
      background: linear-gradient(180deg, #ffd7a8, #ffad6b);
      box-shadow: 0 6px 0 #d88445;
    }

    .mini-log {
      min-height: 42px;
      text-align: center;
      font-weight: 900;
      color: #8d76d6;
      line-height: 1.7;
      background: rgba(255, 255, 255, 0.6);
      border: 2px solid #d8ccff;
      border-radius: 18px;
      padding: 10px;
      margin-top: 16px;
    }

    .help-card {
      border-color: #9ee8df;
      box-shadow:
        0 10px 0 #c5f4ee,
        0 18px 28px rgba(70, 166, 150, 0.15);
      line-height: 1.9;
      font-weight: 800;
    }

    .card-title {
      text-align: center;
      font-size: 20px;
      color: #8d76d6;
      font-weight: 1000;
      margin-bottom: 12px;
    }

    .help-card ul {
      margin: 8px 0 0;
      padding-left: 1.4em;
    }

    .sparkle {
      color: #ffb800;
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      .card {
        padding: 16px;
        border-radius: 22px;
      }

      h1 {
        font-size: 28px;
      }

      .question {
        min-height: 220px;
      }

      .number {
        font-size: 42px;
      }

      .final-number {
        font-size: 34px;
        padding: 10px 12px;
      }

      .buttons {
        gap: 7px;
      }

      button {
        font-size: 20px;
        padding: 16px 4px;
        border-radius: 15px;
      }

      .control-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <section class="card title-card">
      <h1>ざんえいのぱすわーど</h1>
      <div class="subtitle">
        でてきたすうじを入れてね。<br>
        せいかいすうをくりっく⇒
      </div>
    </section>

    <section class="card">
      <div class="status">
        <div class="badge badge-turn" id="turnBadge">1回目</div>
        <div class="badge badge-mode" id="modeBadge">1回目は1111だよ</div>
      </div>

      <div class="question">
        <div class="question-label" id="questionLabel">このすうじを入れてね</div>

        <div class="number-area" id="numberArea">
          <div class="number">1 1 1 1</div>
        </div>
      </div>

      <div class="buttons-wrap">
        <div class="click-caption" id="clickCaption">せいかいすうをくりっく</div>
        <div class="buttons" id="hitButtons">
          <button class="button-0" onclick="inputHit(0)">0</button>
          <button class="button-1" onclick="inputHit(1)">1</button>
          <button class="button-2" onclick="inputHit(2)">2</button>
          <button class="button-3" onclick="inputHit(3)">3</button>
          <button class="button-4" onclick="inputHit(4)">4</button>
        </div>
      </div>

      <div class="control-buttons">
        <button class="control back" onclick="backStep()">もどる</button>
        <button class="control reset" onclick="resetGame()">リセット</button>
      </div>

      <div class="mini-log" id="miniLog">まだなにも押してないよ</div>
    </section>

    <section class="card help-card">
      <div class="card-title">つかいかた</div>
      <ul>
        <li>さいしょは <b>1111</b> を入れるよ。</li>
        <li>せいかいすうを 0〜4 からくりっく。</li>
        <li>つぎのすうじが同じ場所に出るよ。</li>
        <li>こたえが2こあるときは、だめならつぎのこうほを入れてね。</li>
      </ul>
    </section>
  </div>

  <script>
    const tableRules = {
      "1111:4": {
        type: "answer",
        answers: ["1111"]
      },
      "1111:0": {
        type: "answer",
        answers: ["2222"]
      },

      "1111:3": {
        type: "next",
        guess: "1122"
      },
      "1111:3|1122:3": {
        type: "answer",
        answers: ["1112", "1121"]
      },
      "1111:3|1122:1": {
        type: "answer",
        answers: ["1211", "2111"]
      },

      "1111:1": {
        type: "next",
        guess: "1122"
      },
      "1111:1|1122:3": {
        type: "answer",
        answers: ["1222", "2122"]
      },
      "1111:1|1122:1": {
        type: "answer",
        answers: ["2212", "2221"]
      },
      "1111:1|1122:0": {
        type: "answer",
        answers: ["2211"]
      },
      "1111:1|1122:4": {
        type: "answer",
        answers: ["1122"]
      },

      "1111:2": {
        type: "next",
        guess: "1122"
      },
      "1111:2|1122:0": {
        type: "answer",
        answers: ["2211"]
      },
      "1111:2|1122:4": {
        type: "answer",
        answers: ["1122"]
      },
      "1111:2|1122:2": {
        type: "next",
        guess: "1212"
      },
      "1111:2|1122:2|1212:0": {
        type: "answer",
        answers: ["2121"]
      },
      "1111:2|1122:2|1212:4": {
        type: "answer",
        answers: ["1212"]
      },
      "1111:2|1122:2|1212:2": {
        type: "answer",
        answers: ["1221", "2112"]
      }
    };

    let state = {
      turn: 1,
      guess: "1111",
      logs: [],
      answers: [],
      finished: false,
      error: false
    };

    const snapshots = [];

    function inputHit(hit) {
      if (state.finished || state.error) {
        return;
      }

      snapshots.push(copyState(state));

      state.logs.push({
        turn: state.turn,
        guess: state.guess,
        hit: hit
      });

      const path = getPath();
      const rule = tableRules[path];

      if (!rule) {
        state.error = true;
        render();
        return;
      }

      if (rule.type === "answer") {
        state.finished = true;
        state.answers = rule.answers;
        render();
        return;
      }

      state.turn++;
      state.guess = rule.guess;
      render();
    }

    function render() {
      const turnBadge = document.getElementById("turnBadge");
      const modeBadge = document.getElementById("modeBadge");
      const questionLabel = document.getElementById("questionLabel");
      const numberArea = document.getElementById("numberArea");
      const guideText = document.getElementById("guideText");
      const clickCaption = document.getElementById("clickCaption");
      const miniLog = document.getElementById("miniLog");

      turnBadge.textContent = `${state.turn}回目`;

      if (state.error) {
        modeBadge.textContent = "まちがってるかも";
        questionLabel.textContent = "こうほがないよ";
        numberArea.innerHTML = `<div class="number final-number">?</div>`;
        guideText.textContent = "もどるかリセットしてね";
        clickCaption.textContent = "せいかいすうがどこかちがうかも";
        setButtonsDisabled(true);
        miniLog.innerHTML = makeLogText();
        return;
      }

      if (state.finished) {
        modeBadge.textContent = state.answers.length === 1
          ? "こたえが出たよ"
          : `こたえのこうほが ${state.answers.length}こあるよ`;

        questionLabel.textContent = state.answers.length === 1
          ? "こたえはこれ"
          : "この中のどれかだよ";

        numberArea.innerHTML = state.answers.map(answer => {
          return `<div class="number final-number">${formatNumber(answer)}</div>`;
        }).join("");

        guideText.textContent = state.answers.length === 1
          ? "このすうじを入れておわり"
          : "だめならつぎのこうほを入れてね";

        clickCaption.textContent = "けっかが出たよ";
        setButtonsDisabled(true);
        miniLog.innerHTML = makeLogText();
        return;
      }

      modeBadge.textContent = state.turn === 1
        ? "1回目は1111だよ"
        : "つぎはこれだよ";

      questionLabel.textContent = "このすうじを入れてね";
      numberArea.innerHTML = `<div class="number">${formatNumber(state.guess)}</div>`;
      guideText.textContent = "せいかいすうをくりっく";
      clickCaption.textContent = "せいかいすうをくりっく";
      setButtonsDisabled(false);
      miniLog.innerHTML = makeLogText();
    }

    function makeLogText() {
      if (state.logs.length === 0) {
        return "まだなにも押してないよ";
      }

      return state.logs.map(log => {
        return `${log.turn}回目：${formatNumber(log.guess)} → ${log.hit}こ`;
      }).join("<br>");
    }

    function backStep() {
      if (snapshots.length === 0) {
        return;
      }

      state = snapshots.pop();
      render();
    }

    function resetGame() {
      state = {
        turn: 1,
        guess: "1111",
        logs: [],
        answers: [],
        finished: false,
        error: false
      };

      snapshots.length = 0;
      render();
    }

    function getPath() {
      return state.logs.map(log => {
        return `${log.guess}:${log.hit}`;
      }).join("|");
    }

    function setButtonsDisabled(disabled) {
      document.querySelectorAll("#hitButtons button").forEach(button => {
        button.disabled = disabled;
      });
    }

    function copyState(source) {
      return {
        turn: source.turn,
        guess: source.guess,
        logs: source.logs.map(log => ({ ...log })),
        answers: [...source.answers],
        finished: source.finished,
        error: source.error
      };
    }

    function formatNumber(value) {
      return value.split("").join(" ");
    }

    render();
  </script>
</body>
</html>
