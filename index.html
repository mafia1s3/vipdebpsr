<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蝕花の残影 数字入力ギミック</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #0b0f17;
      color: #f5f7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
    }

    .card {
      background: #151a24;
      border: 1px solid #2b3548;
      border-radius: 16px;
      padding: 22px 14px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 24px;
      line-height: 1.4;
    }

    .desc {
      text-align: center;
      color: #b9c3d8;
      font-size: 14px;
      line-height: 1.7;
    }

    .turn-label {
      text-align: center;
      color: #37ffd0;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .number {
      text-align: center;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #5d94ff;
      margin-bottom: 16px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 18px 6px;
      font-size: 22px;
      font-weight: 800;
      color: white;
      background: #375aa0;
      cursor: pointer;
    }

    button:hover {
      background: #4870c4;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .note {
      text-align: center;
      color: #c9d3e8;
      font-size: 14px;
      margin-top: 14px;
      line-height: 1.7;
    }

    .result-title {
      text-align: center;
      font-size: 16px;
      color: #37ffd0;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .answer {
      text-align: center;
      font-size: 54px;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: #ffdf5d;
      margin: 12px 0;
    }

    .candidate-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .candidate {
      background: #20283a;
      border: 1px solid #3a4660;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.14em;
    }

    .history {
      display: grid;
      gap: 8px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      gap: 8px;
      align-items: center;
      background: #111620;
      border: 1px solid #2b3548;
      border-radius: 10px;
      padding: 10px;
      font-weight: bold;
    }

    .history-turn {
      color: #37ffd0;
    }

    .history-num {
      text-align: center;
      color: #8fb2ff;
      letter-spacing: 0.14em;
      font-size: 20px;
    }

    .history-hit {
      text-align: right;
      color: #ffdf5d;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .reset {
      background: #40495f;
    }

    .reset:hover {
      background: #56627c;
    }

    .error {
      color: #ff7777;
      text-align: center;
      font-weight: bold;
      line-height: 1.7;
    }

    .footer {
      text-align: center;
      color: #9eabc2;
      font-size: 13px;
    }

    @media (max-width: 520px) {
      .number {
        font-size: 44px;
      }

      .answer {
        font-size: 44px;
      }

      button {
        font-size: 20px;
        padding: 16px 4px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="card">
      <h1>蝕花の残影<br>数字入力ギミック</h1>
      <div class="desc">
        1回目は必ず <b>1111</b>。<br>
        表示された数字を入力して、出た成功数を押してください。
      </div>
    </div>

    <div class="card" id="mainCard">
      <div class="turn-label" id="turnLabel">1回目</div>
      <div class="number" id="currentGuess">1111</div>

      <div class="buttons" id="hitButtons">
        <button onclick="inputHit(0)">0</button>
        <button onclick="inputHit(1)">1</button>
        <button onclick="inputHit(2)">2</button>
        <button onclick="inputHit(3)">3</button>
        <button onclick="inputHit(4)">4</button>
      </div>

      <div class="note" id="note">
        成功数を押してください。<br>
        有効：0 / 1 / 2 / 3 / 4
      </div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultBody"></div>
    </div>

    <div class="card" id="historyCard" style="display:none;">
      <div class="result-title">入力履歴</div>
      <div class="history" id="history"></div>
    </div>

    <div class="card">
      <div class="controls">
        <button class="reset" onclick="resetGame()">リセット</button>
      </div>
    </div>

    <div class="card footer">
      1と2だけで構成される4桁の全16通りから自動で候補を絞り込みます。
    </div>
  </div>

  <script>
    const allAnswers = createAllAnswers();

    const fixedGuesses = [
      "1111",
      "1122",
      "1212",
      "1221"
    ];

    let turn = 0;
    let currentGuess = fixedGuesses[0];
    let candidates = [...allAnswers];
    let logs = [];

    function createAllAnswers() {
      const list = [];

      for (let i = 0; i < 16; i++) {
        let value = "";

        for (let bit = 3; bit >= 0; bit--) {
          value += ((i >> bit) & 1) === 0 ? "1" : "2";
        }

        list.push(value);
      }

      return list;
    }

    function countSuccess(answer, guess) {
      let count = 0;

      for (let i = 0; i < 4; i++) {
        if (answer[i] === guess[i]) {
          count++;
        }
      }

      return count;
    }

    function inputHit(hit) {
      logs.push({
        turn: turn + 1,
        guess: currentGuess,
        hit: hit
      });

      candidates = candidates.filter(answer => {
        return countSuccess(answer, currentGuess) === hit;
      });

      renderHistory();

      if (candidates.length === 0) {
        showError();
        disableButtons();
        return;
      }

      if (candidates.length === 1) {
        showAnswer(candidates[0]);
        disableButtons();
        return;
      }

      turn++;
      currentGuess = decideNextGuess();

      renderCurrent();
      showCandidates();
    }

    function decideNextGuess() {
      if (turn < fixedGuesses.length) {
        return fixedGuesses[turn];
      }

      let bestGuess = null;
      let bestWorstCount = Infinity;

      for (const guess of allAnswers) {
        const groups = {};

        for (const answer of candidates) {
          const hit = countSuccess(answer, guess);
          groups[hit] = (groups[hit] || 0) + 1;
        }

        const worstCount = Math.max(...Object.values(groups));

        if (worstCount < bestWorstCount) {
          bestWorstCount = worstCount;
          bestGuess = guess;
        }
      }

      return bestGuess;
    }

    function renderCurrent() {
      document.getElementById("turnLabel").textContent = `${turn + 1}回目`;
      document.getElementById("currentGuess").textContent = formatNumber(currentGuess);

      document.getElementById("note").innerHTML = `
        この数字を入力してください。<br>
        入力後、表示された成功数を押してください。
      `;
    }

    function showCandidates() {
      const resultCard = document.getElementById("resultCard");
      const resultTitle = document.getElementById("resultTitle");
      const resultBody = document.getElementById("resultBody");

      resultCard.style.display = "block";
      resultTitle.textContent = `現在の候補：${candidates.length}個`;

      resultBody.innerHTML = `
        <div class="candidate-list">
          ${candidates.map(value => {
            return `<div class="candidate">${formatNumber(value)}</div>`;
          }).join("")}
        </div>
      `;
    }

    function showAnswer(answer) {
      const resultCard = document.getElementById("resultCard");
      const resultTitle = document.getElementById("resultTitle");
      const resultBody = document.getElementById("resultBody");

      resultCard.style.display = "block";
      resultTitle.textContent = "最終的な答え";

      resultBody.innerHTML = `
        <div class="answer">${formatNumber(answer)}</div>
        <div class="note">この数字を入力してください。</div>
      `;
    }

    function showError() {
      const resultCard = document.getElementById("resultCard");
      const resultTitle = document.getElementById("resultTitle");
      const resultBody = document.getElementById("resultBody");

      resultCard.style.display = "block";
      resultTitle.textContent = "候補なし";

      resultBody.innerHTML = `
        <div class="error">
          入力した成功数のどこかが間違っている可能性があります。<br>
          リセットして最初からやり直してください。
        </div>
      `;
    }

    function renderHistory() {
      const historyCard = document.getElementById("historyCard");
      const history = document.getElementById("history");

      historyCard.style.display = "block";

      history.innerHTML = logs.map(log => {
        return `
          <div class="history-row">
            <div class="history-turn">${log.turn}回目</div>
            <div class="history-num">${formatNumber(log.guess)}</div>
            <div class="history-hit">${log.hit}個</div>
          </div>
        `;
      }).join("");
    }

    function disableButtons() {
      const buttons = document.querySelectorAll("#hitButtons button");

      buttons.forEach(button => {
        button.disabled = true;
      });
    }

    function enableButtons() {
      const buttons = document.querySelectorAll("#hitButtons button");

      buttons.forEach(button => {
        button.disabled = false;
      });
    }

    function resetGame() {
      turn = 0;
      currentGuess = fixedGuesses[0];
      candidates = [...allAnswers];
      logs = [];

      document.getElementById("resultCard").style.display = "none";
      document.getElementById("resultTitle").textContent = "";
      document.getElementById("resultBody").innerHTML = "";

      document.getElementById("historyCard").style.display = "none";
      document.getElementById("history").innerHTML = "";

      document.getElementById("note").innerHTML = `
        成功数を押してください。<br>
        有効：0 / 1 / 2 / 3 / 4
      `;

      enableButtons();
      renderCurrent();
    }

    function formatNumber(value) {
      return value.split("").join(" ");
    }

    renderCurrent();
  </script>
</body>
</html>
